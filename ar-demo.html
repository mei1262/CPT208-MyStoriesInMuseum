<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR 导览演示 - MyStoryInMuseum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    model-viewer { width: 100%; height: 500px; background: #111; border-radius: 1.5rem; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Navbar -->
  <nav class="bg-black/80 backdrop-blur-md border-b border-amber-500 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-museum text-3xl text-amber-400"></i>
        <span class="text-2xl font-bold tracking-widest">MyStoryInMuseum</span>
      </div>
      <a href="index.html" class="text-amber-400 hover:text-white flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> 返回主页面
      </a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <h1 class="text-5xl font-bold text-center mb-2">XR 虚拟导览 · AR 实时演示</h1>
    <p class="text-center text-amber-300 text-xl mb-8">你的专属虚拟伙伴正在展厅里等你</p>

    <!-- 当前选择信息 -->
    <div class="bg-zinc-900 rounded-3xl p-6 mb-8 flex flex-wrap gap-6 items-center justify-between">
      <div>
        <p class="text-amber-300 text-sm">当前博物馆 · 苏州博物馆</p>
        <p class="text-3xl font-bold">伍子胥（你的虚拟伙伴）</p>
      </div>
      <div class="flex items-center gap-4">
        <span onclick="switchZone(1)" class="cursor-pointer px-6 py-3 bg-amber-400 text-black rounded-2xl font-semibold hover:scale-105 transition">展区1：入口大厅</span>
        <span onclick="switchZone(2)" class="cursor-pointer px-6 py-3 bg-zinc-800 hover:bg-amber-400 hover:text-black rounded-2xl font-semibold transition">展区2：吴地文化厅</span>
        <span onclick="switchZone(3)" class="cursor-pointer px-6 py-3 bg-zinc-800 hover:bg-amber-400 hover:text-black rounded-2xl font-semibold transition">展区3：明清家具厅</span>
      </div>
      <div class="text-sm text-zinc-400">
        <i class="fa-solid fa-info-circle"></i> 切换展区可缓解长时间佩戴 XR 设备疲劳
      </div>
    </div>

    <!-- AR 核心 -->
    <model-viewer id="ar-model" 
                  src="https://modelviewer.dev/assets/ShopifyModels/Chair.glb" 
                  ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls 
                  auto-rotate 
                  shadow-intensity="1"
                  alt="你的虚拟导览伙伴 - 伍子胥">
    </model-viewer>

    <div class="mt-6 text-center text-zinc-400 text-sm">
      💡 在手机上点击“AR”按钮即可进入真实增强现实模式<br>
      （当前为演示模型，请后续替换为你的 Avatar .glb 文件）
    </div>

    <!-- Playful 交互区 -->
    <div class="grid md:grid-cols-3 gap-6 mt-12">
      <!-- Feature 1 -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="text-xl font-bold flex items-center gap-2 mb-4"><i class="fa-solid fa-robot text-amber-400"></i> 虚拟伙伴实时对话</h3>
        <p class="text-zinc-400 mb-6">伍子胥正在为你讲解吴地文化…</p>
        <button onclick="speakToUser()" 
                class="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-black py-4 rounded-2xl font-bold">
          🎤 让我听听你的问题
        </button>
      </div>

      <!-- Feature 3 -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="text-xl font-bold flex items-center gap-2 mb-4"><i class="fa-solid fa-ticket text-amber-400"></i> 展区打卡 · 故事碎片</h3>
        <p id="fragment-count" class="text-3xl font-bold text-amber-400 mb-2">已收集 1/3 碎片</p>
        <button onclick="collectFragment()" 
                class="w-full bg-zinc-800 hover:bg-amber-400 hover:text-black py-4 rounded-2xl font-bold">
          📍 当前展区打卡
        </button>
      </div>

      <!-- Feature 2 -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="text-xl font-bold flex items-center gap-2 mb-4"><i class="fa-solid fa-film text-amber-400"></i> AI 纪念视频</h3>
        <p class="text-zinc-400 mb-6">上传照片后可直接生成你的专属故事视频</p>
        <button onclick="window.location.href='index.html#creator'" 
                class="w-full bg-gradient-to-r from-purple-500 to-amber-400 text-black py-4 rounded-2xl font-bold">
          ✨ 去生成纪念视频
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentZone = 1;
    let fragments = 1;

    function switchZone(zone) {
      currentZone = zone;
      document.getElementById('ar-model').setAttribute('src', 
        zone === 1 ? 'https://modelviewer.dev/assets/ShopifyModels/Chair.glb' : 
        zone === 2 ? 'https://modelviewer.dev/assets/ShopifyModels/RobotExpressive.glb' : 
        'https://modelviewer.dev/assets/ShopifyModels/Chair.glb'
      );
      alert(`✅ 已切换到展区 ${zone}（缓解 XR 疲劳机制）`);
    }

    function collectFragment() {
      fragments++;
      document.getElementById('fragment-count').innerHTML = `已收集 ${fragments}/3 碎片 🎉`;
      if (fragments >= 3) {
        alert('🏆 恭喜！你已集齐所有故事碎片，解锁专属 Avatar 皮肤！');
      }
    }

    function speakToUser() {
      const messages = [
        "吴国忠臣伍子胥在此！苏州城就是我当年所建，你想听哪一段历史？",
        "月落乌啼霜满天… 你今天在枫桥夜泊展厅打卡了吗？",
        "哈哈哈，我觉得你应该多看一看明清家具，那可都是真家伙！"
      ];
      const utterance = new SpeechSynthesisUtterance(messages[Math.floor(Math.random()*messages.length)]);
      utterance.lang = 'zh-CN';
      speechSynthesis.speak(utterance);
    }

    // Tailwind
    tailwind.config = { content: ["./**/*.{html,js}"] };
  </script>
</body>
</html>
